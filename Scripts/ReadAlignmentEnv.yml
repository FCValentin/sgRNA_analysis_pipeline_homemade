name: ReadAlignment
# Alignment-only environment: BWA + SAMtools
# Install: conda env create -f ReadAlignmentEnv.yml
# Activate: conda activate ReadAlignment
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.6
  - bwa=0.7.17
  - samtools=1.12
  - sambamba=0.8.1
  - gcc=11.2.0
  - gawk
