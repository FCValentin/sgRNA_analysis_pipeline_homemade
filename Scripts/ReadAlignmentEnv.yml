name: ReadAlignment
# Alignment-only environment: BWA + SAMtools
# Install: conda env create -f ReadAlignmentEnv.yml
# Activate: conda activate ReadAlignment
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.6
  - bwa=0.7.17
  - samtools=1.17
  - sambamba=1.0
  - fastqc=0.12.1
  - gcc=12.3.0
  - gawk
