name: sgRNAPipeline
# Full pipeline environment: MAGeCK counting
# Install: conda env create -f sgRNAEnv.yml
# Activate: conda activate sgRNAPipeline
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.6        
  - samtools=1.12
  - sambamba=0.8.1
  - gcc=12.3.0
  - gawk
  - mageck=0.5.9.5 
