name: sgRNAPipeline
# Full pipeline environment: trimming + alignment + MAGeCK counting
# Install: conda env create -f sgRNAEnv.yml
# Activate: conda activate sgRNAPipeline
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.6        
  - samtools=1.17
  - sambamba=1.0
  - bedtools=2.31.0
  - gcc=12.3.0
  - gawk
  - mageck=0.5.9.5    # added: was missing from original env
