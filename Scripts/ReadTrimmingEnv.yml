name: ReadTrimming
# Trimming-only environment: TrimGalore + FastQC + QC utilities
# Install: conda env create -f ReadTrimmingEnv.yml
# Activate: conda activate ReadTrimming
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - cutadapt=4.4
  - trim-galore=0.6.10
  - fastqc=0.12.1
  - samtools=1.17
  - sambamba=1.0
  - gcc=12.3.0
  - gawk
