name: ReadTrimming
# Trimming-only environment: TrimGalore + FastQC + QC utilities
# Install: conda env create -f ReadTrimmingEnv.yml
# Activate: conda activate ReadTrimming
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.6
  - cutadapt=1.18
  - trim-galore=0.4.5
  - fastqc=0.11.9
  - samtools=1.12
  - sambamba=0.8.1
  - gcc=11.2.0
  - gawk
